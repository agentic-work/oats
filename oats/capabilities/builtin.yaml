# OAT Built-in Capabilities
# These define WHAT is available, not HOW to use it.

capabilities:
  # ============================================
  # HTTP / Web Requests
  # ============================================
  - name: http
    description: |
      Make HTTP requests to external APIs and web services.
      Supports GET, POST, PUT, DELETE methods.
      Use httpx for async requests.
    auth:
      type: none
      description: No auth by default, but can use bearer tokens if provided
    allowed_domains: []  # Empty = all domains allowed (configure per-deployment)
    rate_limit: 60  # requests per minute
    max_response_size: 10000000  # 10MB
    sdk_import: "import httpx"

  # ============================================
  # Filesystem
  # ============================================
  - name: filesystem
    description: |
      Read and write files on the local filesystem.
      Restricted to the configured working directory.
      Use pathlib for path operations.
    auth:
      type: none
      description: No auth, but path restrictions apply
    sdk_import: "from pathlib import Path"

  # ============================================
  # Shell Commands
  # ============================================
  - name: shell
    description: |
      Execute shell commands in a subprocess.
      Commands run in the configured working directory.
      Use asyncio.create_subprocess_exec for async execution.
    auth:
      type: none
      description: No auth, sandboxed execution
    sdk_import: "import asyncio"

  # ============================================
  # GitHub API
  # ============================================
  - name: github
    description: |
      Access the GitHub REST API for repositories, issues, PRs, users, etc.
      Requires a GitHub Personal Access Token or GitHub App credentials.
      Use httpx to call api.github.com endpoints.
    auth:
      type: bearer
      scopes:
        - repo:read
        - repo:write
        - issues:read
        - issues:write
        - pull_requests:read
        - pull_requests:write
        - user:read
        - notifications:read
      token_env_var: GITHUB_TOKEN
      description: GitHub Personal Access Token
    allowed_domains:
      - api.github.com
    rate_limit: 30  # Be conservative with GitHub API
    schema_url: https://api.github.com
    schema_type: openapi
    sdk_import: "import httpx  # Use Authorization: Bearer {GITHUB_TOKEN}"

  # ============================================
  # Slack API
  # ============================================
  - name: slack
    description: |
      Access the Slack Web API for messages, channels, users, etc.
      Requires a Slack Bot Token or User Token.
    auth:
      type: bearer
      scopes:
        - channels:read
        - channels:write
        - chat:write
        - users:read
        - files:read
        - files:write
      token_env_var: SLACK_TOKEN
      description: Slack Bot Token (xoxb-) or User Token (xoxp-)
    allowed_domains:
      - slack.com
      - api.slack.com
    rate_limit: 20
    schema_type: openapi
    sdk_import: "import httpx  # Use Authorization: Bearer {SLACK_TOKEN}"

  # ============================================
  # AWS
  # ============================================
  - name: aws
    description: |
      Access AWS services via the AWS REST APIs.
      Covers S3, DynamoDB, Lambda, SQS, SNS, CloudWatch, EC2, IAM, and more.
      Use boto3 for AWS SDK operations.
      Requires AWS credentials (access key + secret key, or IAM role).
    auth:
      type: custom
      token_env_var: AWS_ACCESS_KEY_ID
      scopes:
        - s3:read
        - s3:write
        - dynamodb:read
        - dynamodb:write
        - lambda:invoke
        - sqs:read
        - sqs:write
        - sns:publish
        - cloudwatch:read
        - ec2:describe
      description: AWS credentials via access key or IAM role. Also needs AWS_SECRET_ACCESS_KEY and optionally AWS_SESSION_TOKEN.
    sdk_import: "import boto3"
    sdk_hints: |
      Use boto3 client or resource interfaces.
      Common patterns:
        s3 = boto3.client('s3')
        s3.list_buckets()
        s3.get_object(Bucket='name', Key='path')
      Region from AWS_DEFAULT_REGION or AWS_REGION env var.
      For async, use aioboto3 if available, otherwise run boto3 in executor.

  # ============================================
  # Google Cloud Platform (GCP)
  # ============================================
  - name: gcp
    description: |
      Access Google Cloud Platform services via REST APIs.
      Covers Cloud Storage, BigQuery, Pub/Sub, Cloud Functions, Compute Engine, Billing, and more.
      Use the google-cloud Python SDK with Application Default Credentials (ADC).
    auth:
      type: custom
      scopes:
        - storage:read
        - storage:write
        - bigquery:read
        - bigquery:write
        - pubsub:read
        - pubsub:write
        - compute:read
        - billing:read
      description: Uses Application Default Credentials (ADC). Set up with gcloud auth application-default login, or set GOOGLE_APPLICATION_CREDENTIALS to a service account key file.
    allowed_domains:
      - googleapis.com
      - storage.googleapis.com
      - bigquery.googleapis.com
    sdk_import: "import google.auth; from google.cloud import storage, bigquery"
    sdk_hints: |
      IMPORTANT: Always use Application Default Credentials (ADC). Never look for JSON key env vars.
      Auth pattern:
        import google.auth
        credentials, project = google.auth.default()
      Or let client libraries handle it automatically:
        from google.cloud import storage
        client = storage.Client(project='my-project')  # Uses ADC automatically
      Common patterns:
        Storage: client = storage.Client(project=os.environ.get('GOOGLE_CLOUD_PROJECT', 'my-project'))
        BigQuery: client = bigquery.Client(project=os.environ.get('GOOGLE_CLOUD_PROJECT'))
        Billing: Use httpx with google.auth credentials for REST API
      Project ID from GOOGLE_CLOUD_PROJECT env var.
      The google-cloud-storage and google-cloud-bigquery libraries are pre-installed.

  # ============================================
  # Microsoft Azure
  # ============================================
  - name: azure
    description: |
      Access Microsoft Azure services via REST APIs.
      Covers Blob Storage, Cosmos DB, Azure Functions, Key Vault, and more.
      Use the azure-* Python SDKs or httpx with bearer token.
      Requires Azure credentials (service principal, managed identity, or CLI login).
    auth:
      type: bearer
      token_env_var: AZURE_CLIENT_SECRET
      scopes:
        - storage:read
        - storage:write
        - cosmosdb:read
        - cosmosdb:write
        - keyvault:read
        - functions:invoke
      description: Azure Service Principal credentials. Needs AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID. Or use DefaultAzureCredential for managed identity / CLI auth.
    allowed_domains:
      - azure.com
      - blob.core.windows.net
      - vault.azure.net
      - documents.azure.com
    sdk_import: "from azure.identity import DefaultAzureCredential; from azure.storage.blob import BlobServiceClient"
    sdk_hints: |
      Use azure-identity for auth: credential = DefaultAzureCredential()
      Common patterns:
        Blob Storage: BlobServiceClient(account_url, credential=credential)
        Key Vault: SecretClient(vault_url, credential=credential)
      If azure-* libs unavailable, use httpx with OAuth2 bearer token.
      Get token: credential.get_token("https://management.azure.com/.default")

  # ============================================
  # JSON Processing
  # ============================================
  - name: json
    description: |
      Parse, transform, and generate JSON data.
      Use the built-in json module.
    auth:
      type: none
    sdk_import: "import json"

  # ============================================
  # Date/Time
  # ============================================
  - name: datetime
    description: |
      Work with dates, times, timezones, and durations.
      Use datetime and zoneinfo modules.
    auth:
      type: none
    sdk_import: "from datetime import datetime, timedelta; from zoneinfo import ZoneInfo"

  # ============================================
  # Data Processing
  # ============================================
  - name: data
    description: |
      Process and transform data structures.
      Includes sorting, filtering, grouping, aggregation.
      Use built-in Python functions and comprehensions.
    auth:
      type: none
    sdk_import: "from collections import defaultdict, Counter; from itertools import groupby"
