<svg xmlns="http://www.w3.org/2000/svg" width="820" height="580" viewBox="0 0 820 580">
  <style>
    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink { 0%, 100% { opacity: 1 } 50% { opacity: 0 } }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    .term-text { font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', Consolas, monospace; font-size: 13px; }
    .prompt { fill: #66e5a6; }
    .command { fill: #e2e8f0; }
    .output { fill: #94a3b8; }
    .highlight { fill: #f2a659; }
    .keyword { fill: #a673f2; }
    .string { fill: #66e5a6; }
    .comment { fill: #64748b; }
    .risk-medium { fill: #f2a659; }
    .risk-badge { fill: #1a1520; stroke: #f2a659; stroke-width: 1; }
    .approved { fill: #66e5a6; }
    .cursor { fill: #e2e8f0; animation: blink 1s infinite; }
    .line { animation: fadeIn 0.3s ease-in; }
  </style>

  <!-- Window chrome -->
  <rect width="820" height="580" rx="10" fill="#0a0a0f"/>
  <rect width="820" height="36" rx="10" fill="#1a1a24"/>
  <rect y="26" width="820" height="10" fill="#1a1a24"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="410" y="22" text-anchor="middle" class="term-text" fill="#64748b" font-size="12">oats — synthesize</text>

  <!-- Terminal content -->
  <g transform="translate(20, 52)">
    <!-- Line 1: Install -->
    <text y="0" class="term-text line">
      <tspan class="prompt">$ </tspan>
      <tspan class="command">pip install oats-ai</tspan>
    </text>
    <text y="20" class="term-text output line">Successfully installed oats-ai-0.1.0</text>

    <!-- Line 2: Export -->
    <text y="50" class="term-text line">
      <tspan class="prompt">$ </tspan>
      <tspan class="command">export ANTHROPIC_API_KEY=sk-ant-...</tspan>
    </text>

    <!-- Line 3: Run OATS -->
    <text y="80" class="term-text line">
      <tspan class="prompt">$ </tspan>
      <tspan class="command">oats synthesize "fetch my last 5 GitHub notifications"</tspan>
    </text>

    <!-- Synthesis output -->
    <text y="110" class="term-text line">
      <tspan class="highlight">🌾 Synthesizing tool...</tspan>
    </text>
    <text y="134" class="term-text output line">  Model: claude-sonnet-4-5-20250929</text>
    <text y="152" class="term-text output line">  Capabilities: github, http</text>
    <text y="170" class="term-text output line">  Auth scopes: notifications:read</text>

    <!-- HITL Gate Box -->
    <rect x="0" y="192" width="760" height="186" rx="6" fill="#111118" stroke="#f2a659" stroke-width="1" opacity="0.9"/>

    <text x="14" y="214" class="term-text">
      <tspan class="highlight">🌾 OATS Tool Approval</tspan>
      <tspan dx="10" class="risk-medium">[MEDIUM RISK]</tspan>
    </text>

    <line x1="14" y1="224" x2="746" y2="224" stroke="#f2a659" stroke-width="0.5" opacity="0.3"/>

    <text x="14" y="246" class="term-text output">INTENT: Fetch last 5 GitHub notifications for authenticated user</text>

    <text x="14" y="272" class="term-text output">EXPLANATION: Calls GET /notifications on GitHub REST API with</text>
    <text x="14" y="290" class="term-text output">Bearer token auth. Returns title, reason, and repo for each.</text>

    <text x="14" y="316" class="term-text">
      <tspan class="keyword">CAPABILITIES:</tspan>
      <tspan class="output"> github, http</tspan>
    </text>
    <text x="14" y="334" class="term-text">
      <tspan class="keyword">AUTH SCOPES:</tspan>
      <tspan class="output"> notifications:read</tspan>
    </text>

    <text x="14" y="364" class="term-text">
      <tspan class="string">[y] Approve</tspan>
      <tspan class="output">  [n] Deny  [v] View Code  [e] Edit</tspan>
    </text>

    <!-- User approves -->
    <text y="404" class="term-text line">
      <tspan class="prompt">? </tspan>
      <tspan class="command">y</tspan>
    </text>

    <text y="430" class="term-text approved line">✓ Tool approved — executing in sandbox...</text>

    <!-- Results -->
    <text y="458" class="term-text highlight line">📋 Results:</text>
    <text y="478" class="term-text output line">  1. [mention] Review requested on agentic-work/oats #42</text>
    <text y="496" class="term-text output line">  2. [assign] Issue assigned: Add Bedrock support</text>
    <text y="514" class="term-text output line">  3. [ci_activity] CI passed on agentic-work/oats main</text>

    <!-- Cursor -->
    <rect x="0" y="526" width="8" height="16" class="cursor"/>
  </g>
</svg>
